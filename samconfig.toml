version = 0.1

[default]
[default.global.parameters]
stack_name = "shurly-stack"

[default.build.parameters]
cached = true
parallel = true

[default.validate.parameters]
lint = true

[default.deploy.parameters]
capabilities = "CAPABILITY_IAM"
confirm_changeset = true
resolve_s3 = true
region = "us-east-1"
parameter_overrides = "Environment=dev"
# Add your parameter overrides here:
# parameter_overrides = "Environment=dev DatabaseHost=xxx.rds.amazonaws.com DatabasePassword=xxx JWTSecretKey=xxx"

[default.package.parameters]
resolve_s3 = true

[default.sync.parameters]
watch = true

[default.local_start_api.parameters]
warm_containers = "EAGER"

[default.local_start_lambda.parameters]
warm_containers = "EAGER"

# Development environment
[dev]
[dev.deploy.parameters]
stack_name = "shurly-dev"
capabilities = "CAPABILITY_IAM"
confirm_changeset = true
resolve_s3 = true
region = "us-east-1"
parameter_overrides = "Environment=dev"
tags = "Project=Shurly Environment=dev"

# Staging environment
[staging]
[staging.deploy.parameters]
stack_name = "shurly-staging"
capabilities = "CAPABILITY_IAM"
confirm_changeset = true
resolve_s3 = true
region = "us-east-1"
parameter_overrides = "Environment=staging"
tags = "Project=Shurly Environment=staging"

# Production environment
[prod]
[prod.deploy.parameters]
stack_name = "shurly-prod"
capabilities = "CAPABILITY_IAM"
confirm_changeset = true
resolve_s3 = true
region = "us-east-1"
parameter_overrides = "Environment=prod"
tags = "Project=Shurly Environment=prod"
