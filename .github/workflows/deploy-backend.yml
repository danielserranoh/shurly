name: Deploy Backend to ECS

# Auto-deploy on every merge to main. Branch protection on main requires PR +
# passing tests, so by the time a commit lands here the deploy gate has already
# been crossed. workflow_dispatch is preserved for manual deploys (rollback,
# debugging, deploying to a non-prod env when we add one).
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'prod'
        type: choice
        options:
          - dev
          - staging
          - prod

# OIDC needs id-token: write so the runner can assume the IAM role in AWS
# without long-lived access keys. We use SSO locally and OIDC in CI; access
# keys never enter the picture.
permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-south-2
  ECR_REPOSITORY: shurly-api
  ECS_SERVICE_NAME: shurly-api

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event.inputs.environment || 'dev' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      # Run the test suite before pushing anything to AWS. If tests fail, no
      # bad image lands in ECR and the running service stays untouched.
      - name: Install deps + run tests
        run: |
          uv sync --extra dev
          uv run pytest -q

      - name: Configure AWS credentials (OIDC)
        # The role lives in griddo-main and is created one-time via the
        # commands documented in DEPLOYMENT.md ("CI/CD with OIDC"). Trust
        # policy scopes assumption to this exact repo + branch pattern.
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: gh-actions-shurly-deploy

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image (multi-arch)
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: |
          # Tag = <short-sha>-<run-id>. Short SHA keeps it traceable to the
          # source commit; run id makes the tag unique per workflow run so
          # retries don't collide with the IMMUTABLE ECR repo. Mirrors the
          # convention used by scripts/deploy_ecs.sh.
          SHORT_SHA="${GITHUB_SHA::8}"
          IMAGE_TAG="${SHORT_SHA}-${GITHUB_RUN_ID}"
          IMAGE_URI="${REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"
          # Multi-arch (amd64 + arm64). ECS Fargate currently runs x86_64 by
          # default, so an arm64-only image fails to pull. Building both keeps
          # the manifest portable. Cf. lessons in docs/AWS_ECS_DEPLOYMENT.md.
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --tag "$IMAGE_URI" \
            --push \
            .
          echo "IMAGE_URI=$IMAGE_URI" >> "$GITHUB_ENV"

      - name: Roll out new image to ECS Express
        # update-express-gateway-service triggers Express Mode's blue/green
        # deploy. The ecs-alb-rule-sync Lambda (Phase 4.7) follows the active
        # target group automatically — no manual intervention needed.
        run: |
          SERVICE_ARN=$(aws ecs list-services --cluster default \
            --query "serviceArns[?contains(@, '${ECS_SERVICE_NAME}')] | [0]" \
            --output text)

          if [ -z "$SERVICE_ARN" ] || [ "$SERVICE_ARN" = "None" ]; then
            echo "::error::Service ${ECS_SERVICE_NAME} not found. Run scripts/deploy_ecs.sh manually for the first-time create."
            exit 1
          fi

          # Pull the existing primary container, mutate only the image, and
          # send it back. Avoids overwriting any env-var changes someone may
          # have applied via the console.
          CURRENT_CONTAINER=$(aws ecs describe-express-gateway-service \
            --service-arn "$SERVICE_ARN" \
            --query "service.primaryContainer" --output json)

          UPDATED_CONTAINER=$(echo "$CURRENT_CONTAINER" | \
            jq --arg img "$IMAGE_URI" '.image = $img')

          aws ecs update-express-gateway-service \
            --service-arn "$SERVICE_ARN" \
            --primary-container "$UPDATED_CONTAINER"

          echo "Deploy initiated for $IMAGE_URI"

      - name: Wait for service to stabilize
        run: |
          # ECS Express's deployment-state events fire through EventBridge.
          # Here we just poll for ~3 minutes; the existing alb-rule-sync
          # Lambda will pick up TG changes when the deploy completes.
          for i in $(seq 1 18); do
            STATUS=$(aws ecs describe-express-gateway-service \
              --service-arn "$SERVICE_ARN" \
              --query "service.status" --output text 2>/dev/null || echo "unknown")
            echo "[$i/18] status=$STATUS"
            if [ "$STATUS" = "ACTIVE" ]; then
              echo "✓ Service is ACTIVE"
              exit 0
            fi
            sleep 10
          done
          echo "::warning::Service did not reach ACTIVE within ~3 min. Check the console."

      - name: Smoke test the public host
        # ECS Express auto-hosts use the form `sh-<32-hex>.ecs.<region>.on.aws`,
        # NOT `<service>.ecs...`, so probing the latter always 404s. The right
        # target is the public host bound to Shurly's ALB rule (priority 12).
        # The blue/green Lambda (ecs-alb-rule-sync) handles the TG flip on
        # SERVICE_DEPLOYMENT_COMPLETED, but its EventBridge fan-out can lag a
        # few seconds — so we retry with a short backoff before giving up.
        run: |
          PUBLIC_HOST="s.griddo.io"
          echo "Probing https://${PUBLIC_HOST}/api/v1/health"
          for i in $(seq 1 12); do
            CODE=$(curl -sS -o /dev/null -w "%{http_code}" "https://${PUBLIC_HOST}/api/v1/health" || echo "000")
            if [ "$CODE" = "200" ]; then
              echo "✓ Health endpoint responding (attempt $i)"
              exit 0
            fi
            echo "[$i/12] HTTP $CODE — not ready, retrying in 10s"
            sleep 10
          done
          echo "::error::Health endpoint did not return 200 after rollout"
          exit 1
